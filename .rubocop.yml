inherit_from: .rubocop_todo.yml

AllCops:
  TargetRubyVersion: 2.7
  NewCops: enable
  Include:
    - "**/*.rb"
    - "**/*.cap"
    - "**/*.rake"
    - "**/Gemfile"
    - "**/Rakefile"
    - "appsignal.gemspec"
  Exclude:
    - "*.rbs"
    - "*.rbi"
    - "pkg/**/*"
    - "tmp/**/*"
    - "vendor/**/*"
    - "spec/integration/diagnose/**/*"
  DisplayCopNames: true
  UseCache: true
  CacheRootDirectory: ./tmp

Style/RescueStandardError:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Style/HashSyntax:
  EnforcedStyle: hash_rockets

Style/EmptyMethod:
  EnforcedStyle: expanded

Style/MissingRespondToMissing:
  Exclude:
    - "lib/appsignal/extension.rb"
    - "lib/appsignal/transaction.rb"

Style/TrailingUnderscoreVariable:
  Enabled: false

Style/Lambda:
  EnforcedStyle: lambda

Style/WordArray:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: true
  Exclude:
    - "spec/**/*.rb"

Style/NumericPredicate:
  Enabled: false

Style/SymbolArray:
  EnforcedStyle: brackets

Style/RedundantConstantBase:
  Enabled: false

# Keep the detection but never autocorrect: removing the `\` after a `%()`
# literal silently breaks adjacent-string concatenation, turning the joined
# string into dead code. Let it flag for a human instead of rewriting.
Style/RedundantLineContinuation:
  AutoCorrect: false

# Every integration rescues Exception to record the error and re-raise it; the
# exception is never swallowed. The cop can't see the re-raise, so here it only
# ever produces false positives.
Lint/RescueException:
  Enabled: false

Lint/ConstantDefinitionInBlock:
  Exclude:
    - "spec/**/*.rb"

Lint/EmptyClass:
  Exclude:
    - "spec/**/*.rb"

Lint/EmptyFile:
  Exclude:
    - "spec/**/*.rb"

Layout/HashAlignment:
  EnforcedLastArgumentHashStyle: ignore_implicit

Layout/ArgumentAlignment:
  EnforcedStyle: with_fixed_indentation

Layout/LineContinuationLeadingSpace:
  Enabled: false

Layout/FirstArrayElementIndentation:
  EnforcedStyle: consistent

Layout/LineEndStringConcatenationIndentation:
  EnforcedStyle: indented

Layout/ParameterAlignment:
  EnforcedStyle: with_fixed_indentation

Layout/MultilineMethodCallIndentation:
  EnforcedStyle: indented

Layout/MultilineOperationIndentation:
  EnforcedStyle: indented

Layout/LineLength:
  Max: 100

Naming/FileName:
  Exclude:
    - "ext/Rakefile"

Naming/AccessorMethodName:
  Exclude:
    - "lib/appsignal/helpers/instrumentation.rb"
    - "lib/appsignal/transaction.rb"

Naming/RescuedExceptionsVariableName:
  Enabled: false

Naming/VariableNumber:
  Enabled: false

# Complexity and length metrics were never enforced here: their thresholds
# floated for years through `rubocop --auto-gen-config` and the remaining hits
# were silenced inline. They flag a style we deliberately accept, so instead of
# tracking an ever-changing Max we don't run them.
Metrics/AbcSize:
  Enabled: false

Metrics/BlockLength:
  Enabled: false

Metrics/ClassLength:
  Enabled: false

Metrics/CyclomaticComplexity:
  Enabled: false

Metrics/MethodLength:
  Enabled: false

Metrics/ModuleLength:
  Enabled: false

Metrics/PerceivedComplexity:
  Enabled: false

Gemspec/DevelopmentDependencies:
  Enabled: false
